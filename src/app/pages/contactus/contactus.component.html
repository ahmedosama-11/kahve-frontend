<section class="contact-section">
  <div class="container py-3">
    <div class="row justify-content-center mb-5">
      <div class="col-lg-8 text-center animate-fade-in">
        <h6 class="kahve-kicker text-uppercase fw-bold letter-spacing-2">Get in Touch</h6>
        <h1 class="display-4 fw-bold mt-2">Let’s start a coffee conversation.</h1>
        <p class="lead mt-3">Questions about KAHVE products, orders, wholesale or gifts? We’re here to help.</p>
        <div class="header-line mx-auto"></div>
      </div>
    </div>

    <div class="row g-5 align-items-center">
      <div class="col-lg-5 d-none d-lg-block">
        <div class="image-wrapper">
          <img src="/assets/images/kahve-products.jpg" class="img-fluid rounded-custom shadow-lg" alt="KAHVE coffee products">
          <div class="glass-info-overlay p-4">
            <h5 class="fw-bold mb-0">Visit KAHVE</h5>
            <small>Cairo, Egypt · Premium Coffee Products</small>
          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="glass-form-card p-4 p-md-5">
          <form action="contactUs" method="POST">
            <div class="row g-4">
              <div class="col-12">
                <label class="glass-label">Full Name</label>
                <input type="text" class="glass-input" placeholder="e.g. John Doe" required>
              </div>

              <div class="col-md-6">
                <label class="glass-label">Email Address</label>
                <div class="input-group-glass">
                  <span class="icon-box"><i class="fa fa-envelope"></i></span>
                  <input type="email" class="glass-input ps-5" placeholder="name@example.com" required>
                </div>
              </div>

              <div class="col-md-6">
                <label class="glass-label">Phone Number</label>
                <div class="input-group-glass">
                  <span class="icon-box"><i class="fa fa-phone"></i></span>
                  <input type="tel" class="glass-input ps-5" placeholder="+20 123 456 789">
                </div>
              </div>

              <div class="col-12">
                <label class="glass-label">Subject</label>
                <input type="text" class="glass-input" placeholder="How can we help?" required>
              </div>

              <div class="col-12">
                <label class="glass-label">Message</label>
                <textarea class="glass-input" rows="4" placeholder="Your message here..." required></textarea>
              </div>

              <div class="col-12 mt-4">
                <button class="btn-premium-send w-100" type="submit">
                  <span>Send Message</span>
                  <i class="fa fa-paper-plane ms-2"></i>
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
