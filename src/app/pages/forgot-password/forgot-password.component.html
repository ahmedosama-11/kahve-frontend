<section class="login-section auth-responsive-section">
  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col-xl-8 col-lg-10">
        <div class="kahve-auth-card single-auth-card">
          <div class="card-body p-md-5 mx-md-4 w-100">
            <div class="text-center mb-4">
              <div class="auth-brand-mark">K</div>
              <h4 class="mt-3 fw-bold">{{ 'forgot.title' | t }}</h4>
              <p>{{ 'forgot.subtitle' | t }}</p>
            </div>

            <form *ngIf="step === 1" [formGroup]="emailForm" (ngSubmit)="sendCode()">
              <div class="form-outline mb-4">
                <input type="email" class="kahve-input" [placeholder]="'auth.email' | t" formControlName="email" />
              </div>
              <button class="btn-login-main" type="submit" [disabled]="emailForm.invalid || loading">
                {{ loading ? ('common.loading' | t) : ('forgot.sendCode' | t) }}
              </button>
            </form>

            <form *ngIf="step === 2" [formGroup]="codeForm" (ngSubmit)="verifyCode()">
              <div class="form-outline mb-4">
                <input type="text" maxlength="6" class="kahve-input code-input" [placeholder]="'forgot.code' | t" formControlName="resetCode" />
              </div>
              <button class="btn-login-main" type="submit" [disabled]="codeForm.invalid || loading">
                {{ loading ? ('common.loading' | t) : ('forgot.verifyCode' | t) }}
              </button>
            </form>

            <form *ngIf="step === 3" [formGroup]="passwordForm" (ngSubmit)="resetPassword()">
              <div class="form-outline mb-3">
                <input type="password" class="kahve-input" [placeholder]="'forgot.newPassword' | t" formControlName="newPassword" />
              </div>
              <div class="form-outline mb-4">
                <input type="password" class="kahve-input" [placeholder]="'forgot.confirmNewPassword' | t" formControlName="confirmPassword" />
              </div>
              <button class="btn-login-main" type="submit" [disabled]="passwordForm.invalid || loading">
                {{ loading ? ('common.loading' | t) : ('forgot.updatePassword' | t) }}
              </button>
            </form>

            <div *ngIf="errorMessage" class="alert-danger-glass mt-4">
              <i class="fa fa-exclamation-circle me-2"></i>{{ errorMessage }}
            </div>
            <div *ngIf="successMessage" class="alert-success-glass mt-4">
              <i class="fa fa-check-circle me-2"></i>{{ successMessage }}
            </div>

            <div class="text-center mt-4">
              <a routerLink="/login" class="auth-link fw-bold text-decoration-none">{{ 'common.backToLogin' | t }}</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
