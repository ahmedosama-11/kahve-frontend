<section class="signup-section auth-responsive-section">
  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col-xl-10">
        <div class="kahve-auth-card">
          <div class="row g-0 h-100">
            <div class="col-lg-6 d-flex align-items-center">
              <div class="card-body p-md-5 mx-md-4 w-100">
                <div class="text-center mb-4">
                  <div class="auth-brand-mark">K</div>
                  <h4 class="mt-3 fw-bold">{{ 'auth.signupTitle' | t }}</h4>
                  <p>{{ 'auth.signupSubtitle' | t }}</p>
                </div>

                <form [formGroup]="signupForm" (ngSubmit)="onSignup()">
                  <div class="form-outline mb-3">
                    <input type="text" class="kahve-input" [placeholder]="'auth.fullName' | t" formControlName="name" required />
                  </div>

                  <div class="form-outline mb-3">
                    <input type="email" class="kahve-input" [placeholder]="'auth.email' | t" formControlName="email" required />
                  </div>

                  <div class="form-outline mb-3">
                    <input type="tel" class="kahve-input" [placeholder]="'auth.phone' | t" formControlName="phone" required />
                  </div>

                  <div class="form-outline mb-3">
                    <input type="password" class="kahve-input" [placeholder]="'auth.password' | t" formControlName="password" required />
                  </div>

                  <div class="form-outline mb-4">
                    <input type="password" class="kahve-input" [placeholder]="'auth.confirmPassword' | t" formControlName="confirmPassword" required />
                  </div>

                  <div *ngIf="errorMessage" class="alert-danger-glass mb-4">
                    <i class="fa fa-exclamation-circle me-2"></i>{{ errorMessage }}
                  </div>

                  <div *ngIf="successMessage" class="alert-success-glass mb-4">
                    <i class="fa fa-check-circle me-2"></i>{{ successMessage }}
                  </div>

                  <div class="text-center pt-1 mb-4">
                    <button class="btn-signup-main" type="submit" [disabled]="signupForm.invalid || loading">
                      {{ loading ? ('common.loading' | t) : ('auth.signUp' | t) }}
                    </button>
                  </div>

                  <div class="d-flex align-items-center justify-content-center pb-4 auth-bottom-row">
                    <p class="mb-0 me-2 auth-muted">{{ 'auth.alreadyHaveAccount' | t }}</p>
                    <a routerLink="/login" class="auth-link fw-bold text-decoration-none">{{ 'auth.login' | t }}</a>
                  </div>
                </form>
              </div>
            </div>

            <div class="col-lg-6 d-flex align-items-center side-info-panel">
              <div class="px-3 py-4 p-md-5 mx-md-4 text-center">
                <span class="auth-kicker">{{ 'auth.signupSideKicker' | t }}</span>
                <h2 class="mb-4 fw-bold multiline-title">{{ 'auth.signupSideTitle' | t }}</h2>
                <p class="small mb-0">{{ 'auth.signupSideText' | t }}</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
